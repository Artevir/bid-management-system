# ============================================
# GitHub Actions CI/CD 配置
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 环境变量
env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'

jobs:
  # ============================================
  # 代码质量检查
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint检查
        run: pnpm run lint

      - name: TypeScript类型检查
        run: npx tsc --noEmit

      - name: W2-002 字段契约校验（CI 阻断）
        run: pnpm run docs:v3-w2-field-contract:check

      - name: W4-002 DTO/Zod 漂移校验（CI 阻断）
        run: pnpm run docs:v4-dto-zod:check

      - name: W8-001 seed 字典与 030 键值对校验（CI 阻断）
        run: pnpm run docs:v3-w8-seed-dictionary:check

      - name: W5-003 列表页三态组件门禁（CI 阻断）
        run: pnpm run docs:v5-list-states-guard:check

  # ============================================
  # 单元测试
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行测试
        run: pnpm run test

      - name: 生成测试覆盖率报告
        run: pnpm run test:coverage

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # ============================================
  # 构建检查
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建应用
        run: pnpm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bid_management
          JWT_SECRET: ci-jwt-secret
          CRON_SECRET: ci-cron-secret
          E_SIGN_CALLBACK_SECRET: ci-e-sign-secret

      - name: 运行发布门禁检查
        run: pnpm run release:gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bid_management
          JWT_SECRET: ci-jwt-secret
          CRON_SECRET: ci-cron-secret
          E_SIGN_CALLBACK_SECRET: ci-e-sign-secret

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: .next
          retention-days: 7

  # ============================================
  # E2E 冒烟测试
  # ============================================
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 Playwright 浏览器
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行 E2E 冒烟
        run: pnpm run test:e2e:smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bid_management
          JWT_SECRET: ci-jwt-secret
          CRON_SECRET: ci-cron-secret
          E_SIGN_CALLBACK_SECRET: ci-e-sign-secret

  # ============================================
  # Docker镜像构建
  # ============================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, e2e-smoke]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/bid-platform
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ secrets.DOCKER_USERNAME }}/bid-platform:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 部署到生产环境
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/bid-platform
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' bid-platform-app 2>/dev/null || true)
            echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE" > .deploy-state-ci.env
            export APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/bid-platform:sha-${{ github.sha }}
            docker compose pull app
            docker compose run --rm app pnpm run db:migrate
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: 健康检查
        id: prod-healthcheck
        continue-on-error: true
        run: |
          sleep 30
          curl -f https://your-domain.com/api/health || exit 1

      - name: 健康检查失败后回滚
        if: steps.prod-healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/bid-platform
            if [ -f .deploy-state-ci.env ]; then
              source .deploy-state-ci.env
            fi
            if [ -n "$PREVIOUS_IMAGE" ]; then
              export APP_IMAGE=$PREVIOUS_IMAGE
              docker compose pull app || true
              docker compose up -d --remove-orphans
            else
              echo "No previous image found, rollback skipped"
            fi

      - name: 验证回滚后健康状态
        if: steps.prod-healthcheck.outcome == 'failure'
        run: |
          sleep 30
          curl -f https://your-domain.com/api/health || exit 1

      - name: 标记生产部署失败
        if: steps.prod-healthcheck.outcome == 'failure'
        run: exit 1

      - name: 发送部署通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '部署到生产环境完成'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ============================================
  # 部署到预发布环境
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.your-domain.com
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 部署到预发布环境
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /app/bid-platform-staging
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' bid-platform-app 2>/dev/null || true)
            echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE" > .deploy-state-ci.env
            export APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/bid-platform:sha-${{ github.sha }}
            docker compose pull app
            docker compose run --rm app pnpm run db:migrate
            docker compose up -d --remove-orphans

      - name: 健康检查
        id: staging-healthcheck
        continue-on-error: true
        run: |
          sleep 30
          curl -f https://staging.your-domain.com/api/health || exit 1

      - name: 健康检查失败后回滚（预发布）
        if: steps.staging-healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /app/bid-platform-staging
            if [ -f .deploy-state-ci.env ]; then
              source .deploy-state-ci.env
            fi
            if [ -n "$PREVIOUS_IMAGE" ]; then
              export APP_IMAGE=$PREVIOUS_IMAGE
              docker compose pull app || true
              docker compose up -d --remove-orphans
            else
              echo "No previous image found, rollback skipped"
            fi

      - name: 验证预发布回滚后健康状态
        if: steps.staging-healthcheck.outcome == 'failure'
        run: |
          sleep 30
          curl -f https://staging.your-domain.com/api/health || exit 1

      - name: 标记预发布部署失败
        if: steps.staging-healthcheck.outcome == 'failure'
        run: exit 1

  # ============================================
  # 安全扫描
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行 npm audit
        run: pnpm audit --audit-level moderate

      - name: 运行 Snyk安全扫描
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: CodeQL 自动构建
        uses: github/codeql-action/autobuild@v3

      - name: 代码安全分析（CodeQL）
        uses: github/codeql-action/analyze@v3
